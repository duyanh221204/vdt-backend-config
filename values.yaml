database:
  appName: vdt-database
  image: postgres:15-alpine
  username: postgres
  password: duyanh221204
  name: vdt
  host: vdt-database-svc
  port: 5432
  containerPort: 5432
  replicas: 1
  configMapName: vdt-db-init-script
  persistence:
    pvName: vdt-postgres-pv
    pvcName: vdt-postgres-pvc
    storageClassName: manual
    storage: 2Gi
    hostPath: /data/postgres_home
  service:
    name: vdt-database-svc
    type: ClusterIP
    port: 5432
    targetPort: 5432
  resources:
    limits:
      memory: 256Mi
      cpu: 250m

backend:
  appName: vdt-backend
  monitor:
    name: vdt-backend-monitor
